site_name: "Git Tutorial — Code with Branko"
site_url: https://braboj.github.io/tutorial-git/
repo_url: https://github.com/braboj/tutorial-git
repo_name: braboj/tutorial-git

theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home:
    - index.md
    - Contributing: CONTRIBUTING.md
    - License: LICENSE.md
    - Code of Conduct: CODE_OF_CONDUCT.md
    - Sandbox: SANDBOX.md

  - Introduction:
    - 01-Introduction/introduction.md
    - Git Features: 01-Introduction/01-git-features.md
    - Windows Installation: 01-Introduction/02-windows-installation.md
    - Linux Installation: 01-Introduction/03-linux-installation.md
    - Hosting Services: 01-Introduction/04-hosting-services.md
    - Dataflow Overview: 01-Introduction/05-dataflow-overview.md
    - Operations Overview: 01-Introduction/06-operations-overview.md

  - Concepts:
    - 02-Concepts/concepts.md
    - Repository: 02-Concepts/01-repository.md
    - Configuration: 02-Concepts/02-configuration.md
    - Objects: 02-Concepts/03-objects.md
    - Tagging: 02-Concepts/04-tagging.md
    - Index: 02-Concepts/05-index.md
    - References: 02-Concepts/06-references.md
    - Navigation: 02-Concepts/07-navigation.md
    - Branching: 02-Concepts/08-branching.md
    - Merging: 02-Concepts/09-merging.md
    - Stashing: 02-Concepts/10-stashing.md
    - Selectors: 02-Concepts/11-selectors.md
    - Pathspec: 02-Concepts/12-pathspec.md
    - Refspec: 02-Concepts/13-refspec.md
    - Subproject: 02-Concepts/14-subproject.md
    - Conflicts: 02-Concepts/15-conflicts.md
    - Branching Strategies: 02-Concepts/16-branching-strategies.md


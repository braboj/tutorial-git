name: Build Astro site (PR validation)

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm
          cache-dependency-path: astro-site/package-lock.json

      - name: Install dependencies
        working-directory: astro-site
        run: npm ci

      - name: Create assets symlink
        run: mkdir -p astro-site/src/content && ln -s ../../../assets astro-site/src/content/assets

      - name: Build site
        working-directory: astro-site
        run: npm run build

      - name: Create base path symlink for link checker
        run: ln -s . astro-site/dist/tutorial-git

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --root-dir astro-site/dist --config lychee.toml 'astro-site/dist/**/*.html'
          fail: true
